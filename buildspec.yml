version: 0.2

env:
  variables:
    DJANGO_SETTINGS_MODULE: "config.settings.prod"
    ENV: "prod"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "依存関係のインストールを開始..."
      - if ! command -v msgfmt >/dev/null 2>&1; then apt-get update && apt-get install -y gettext; fi
      - pip install --upgrade pip
      - pip install -r requirements.txt
      - pip install aws-sam-cli
      - pip install csscompressor
  pre_build:
    commands:
      - echo "SAMビルドの準備を開始..."
      - |
        case "$ENV" in
          prod)
            DOMAIN_NAME="serverless.portfolio.cobaemon.com"
            DJANGO_SETTINGS_MODULE="config.settings.prod"
            ;;
          staging)
            DOMAIN_NAME="staging.serverless.portfolio.cobaemon.com"
            DJANGO_SETTINGS_MODULE="config.settings.staging"
            ;;
          *)
            echo "Unsupported ENV: $ENV" >&2
            exit 1
            ;;
        esac
        export DOMAIN_NAME
        export DJANGO_SETTINGS_MODULE
      - |
        set +x
        SECRET_ID="${ENV}/portfolio/secret"
        PARAMETER_PREFIX="/${ENV}/portfolio/parameter"
        SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ID" --query SecretString --output text)
        export SECRET_JSON
        eval "$(
          python - <<'EOF'
        import json
        import os
        import shlex

        required_keys = [
            "DJANGO_SECRET_KEY",
            "EMAIL_HOST_USER",
            "EMAIL_HOST_PASSWORD",
            "GOOGLE_CLIENT_ID",
            "GOOGLE_CLIENT_SECRET",
            "GITHUB_CLIENT_ID",
            "GITHUB_CLIENT_SECRET",
        ]
        secret = json.loads(os.environ["SECRET_JSON"])
        missing = [key for key in required_keys if not secret.get(key)]
        if missing:
            raise SystemExit(f"Missing secret values: {', '.join(missing)}")
        for key in required_keys:
            print(f"export {key}={shlex.quote(str(secret[key]))}")
        EOF
        )"
        unset SECRET_JSON
        export ALLOWED_HOSTS="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/allowed_hosts" --query Parameter.Value --output text)"
        export CSRF_TRUSTED_ORIGINS="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/csrf_trusted_origins" --query Parameter.Value --output text)"
        export DEFAULT_FROM_EMAIL="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/default_from_email" --query Parameter.Value --output text)"
        export DEFAULT_TO_EMAIL="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/default_to_mail" --query Parameter.Value --output text)"
        export EMAIL_HOST="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/email_host" --query Parameter.Value --output text)"
        export EMAIL_PORT="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/email_port" --query Parameter.Value --output text)"
        export EMAIL_USE_TLS="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/email_use_tls" --query Parameter.Value --output text)"
        export EMAIL_USE_SSL="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/email_use_ssl" --query Parameter.Value --output text)"
        export LOG_LEVEL="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/log_level" --query Parameter.Value --output text)"
        echo "Loaded build configuration for $ENV without printing secret values."
      # env_vars.txt が存在しない場合に備えて初期化
      - echo "EXISTING_ARECORD=false" > env_vars.txt
      
      # 既存のRoute53 Aレコードを検出
      - echo "既存のRoute53 Aレコードを検出中..."
      - |
        ROOT_DOMAIN=$(echo $DOMAIN_NAME | awk -F'.' '{print $(NF-1)"."$NF}')
        HOSTED_ZONE_ID=$(aws route53 list-hosted-zones-by-name \
          --dns-name "$ROOT_DOMAIN" \
          --query 'HostedZones[0].Id' --output text | awk -F/ '{print $3}')

        if [ -z "$HOSTED_ZONE_ID" ] || [ "$HOSTED_ZONE_ID" = "None" ]; then
          echo "Hosted zone not found for $ROOT_DOMAIN" >&2
          exit 1
        fi

        echo "HOSTED_ZONE_ID=$HOSTED_ZONE_ID" >> env_vars.txt

        STACK_NAME="cobaemon-serverless-portfolio-${ENV}-stack"
        if [ "$ENV" = "prod" ]; then
          STACK_NAME="cobaemon-serverless-portfolio-stack"
        fi
        CFN_RECORD=$(aws cloudformation describe-stack-resource \
          --stack-name $STACK_NAME \
          --logical-resource-id ApiGatewayRecordSet \
          --query 'StackResourceDetail.PhysicalResourceId' \
          --output text 2>/dev/null || true)

        if [ "$CFN_RECORD" != "None" ] && [ -n "$CFN_RECORD" ]; then
          echo "Stack already manages A record: $CFN_RECORD"
          echo "EXISTING_ARECORD=false" >> env_vars.txt
        else
          EXISTING_RECORD=$(aws route53 list-resource-record-sets \
            --hosted-zone-id $HOSTED_ZONE_ID \
            --query "ResourceRecordSets[?Name=='$DOMAIN_NAME.' && Type=='A']" \
            --output text)

          if [ -n "$EXISTING_RECORD" ]; then
            echo "A record exists outside CloudFormation: $DOMAIN_NAME"
            echo "EXISTING_ARECORD=true" >> env_vars.txt
          else
            echo "No existing A record found. It will be created by the stack."
            echo "EXISTING_ARECORD=false" >> env_vars.txt
          fi
        fi
      
      # 多言語対応のため、翻訳カタログの更新漏れを検出してからコンパイルする
      - echo "翻訳カタログの更新漏れ確認とコンパイルを開始..."
      - |
        if [ ! -d "locale" ]; then
          echo "locale directory is missing." >&2
          exit 1
        fi

        LOCALE_BEFORE_DIR="$(mktemp -d)"
        cp -R locale "$LOCALE_BEFORE_DIR/locale"

        python manage.py makemessages -a --ignore=venv --ignore=.venv --ignore=node_modules

        if ! diff -qr "$LOCALE_BEFORE_DIR/locale" locale; then
          echo "Translation catalog files are not up to date. Run makemessages locally and commit the updated .po files." >&2
          exit 1
        fi

        rm -rf "$LOCALE_BEFORE_DIR"
        python manage.py compilemessages
        
      # フォントをダウンロードして配置
      - mkdir -p portfolio/static/assets/fonts
      - curl -L -o portfolio/static/assets/fonts/Montserrat.ttf https://github.com/google/fonts/raw/main/ofl/montserrat/Montserrat-Regular.ttf
      - curl -L -o portfolio/static/assets/fonts/Lato.ttf https://github.com/google/fonts/raw/main/ofl/lato/Lato-Regular.ttf

      # CSS minification
      - |
        python - <<'EOF'
        import pathlib, csscompressor
        src = pathlib.Path('portfolio/static/css/styles.css').read_text()
        pathlib.Path('portfolio/static/css/styles.min.css').write_text(csscompressor.compress(src))
        EOF

      # 静的ファイルの収集とS3への同期
      - python manage.py collectstatic --noinput
      - python manage.py render_static
      - echo "静的ファイルをS3に同期中..."
      - BUCKET_NAME="cobaemon-serverless-portfolio-${ENV}-static"
      - aws s3 sync staticfiles/ s3://${BUCKET_NAME}/ --delete
  build:
    commands:
      - echo "SAMビルドを実行中..."
      - sam build --use-container
  post_build:
    commands:
      - echo "SAMパッケージングを実行中..."
      # 環境変数を読み込み
      - if [ -f env_vars.txt ]; then . ./env_vars.txt; fi
      - 'echo "EXISTING_ARECORD: $EXISTING_ARECORD"'
      - sam package --output-template-file packaged.yaml --s3-bucket $S3Bucket
      # パラメータファイルを作成
      - |
        cat > parameters.json <<EOF
        {
          "Parameters": {
            "Env": "$ENV",
            "ExistingARecord": "$EXISTING_ARECORD",
            "HostedZoneId": "$HOSTED_ZONE_ID",
            "DomainName": "$DOMAIN_NAME",
            "AllowedOrigin": "/${ENV}/portfolio/parameter/csrf_trusted_origins",
            "AllowedHosts": "/${ENV}/portfolio/parameter/allowed_hosts"
          }
        }
        EOF
      - echo "パラメータファイルを作成しました:"
      - cat parameters.json
      # バケットポリシー用のパラメータファイルを作成
      - |
        cat > bucketpolicy-parameters.json <<EOF
        {
          "Parameters": {
            "Env": "$ENV"
          }
        }
        EOF
      - echo "バケットポリシーパラメータファイルを作成しました:"
      - cat bucketpolicy-parameters.json

artifacts:
  files:
    - packaged.yaml
    - parameters.json
    - bucketpolicy.yaml
    - bucketpolicy-parameters.json
