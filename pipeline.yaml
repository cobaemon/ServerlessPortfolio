AWSTemplateFormatVersion: '2010-09-09'
Description: CI/CD Pipeline for the Serverless Portfolio Application

Parameters:
  Env:
    Type: String
    Description: "Deployment environment (staging or prod)"
    Default: prod
    AllowedValues:
      - staging
      - prod
  S3Bucket:
    Type: String
    Description: "The S3 bucket name for storing packaged artifacts."
    Default: cobaemon-serverless-portfolio-prod-artifacts
  CodePipelineName:
    Type: String
    Description: "The CodePipeline pipeline name."
    Default: cobaemon-serverless-portfolio-pipeline
  FullRepositoryId:
    Type: String
    Description: "The full repository ID to use with your CodeConnections connection."
    Default: cobaemon/ServerlessPortfolio
  BranchName:
    Type: String
    Description: "The branch name to use with your CodeConnections connection."
    Default: main
  StackName:
    Type: String
    Description: "The CloudFormation stack name that you want to create or update."
    Default: cobaemon-serverless-portfolio-stack
  TemplatePath:
    Type: String
    Description: "The path in your source repository to the CloudFormation template file."
    Default: packaged.yaml

Conditions:
  IsProd: !Equals [ !Ref Env, prod ]

Resources:
  CodePipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Ref CodePipelineName
      RoleArn: !GetAtt CodePipelineServiceRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref S3Bucket
      Stages:
        - Name: Source
          Actions:
            - Name: CodeConnectionsSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: "arn:aws:codeconnections:ap-northeast-1:864454139429:connection/fcbb3ce3-d1c2-4b93-89e5-ac0f45ae943f"
                FullRepositoryId: !Ref FullRepositoryId
                BranchName: !Ref BranchName
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1
        - Name: UpdatePipeline
          Actions:
            - Name: SelfMutate
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                RoleArn: !GetAtt CloudFormationServiceRole.Arn
                ActionMode: CREATE_UPDATE
                Capabilities: CAPABILITY_IAM,CAPABILITY_AUTO_EXPAND,CAPABILITY_NAMED_IAM
                StackName: !Ref AWS::StackName
                TemplatePath: SourceOutput::pipeline.yaml
                ParameterOverrides: !Sub |
                  {
                    "Env": "${Env}",
                    "S3Bucket": "${S3Bucket}",
                    "CodePipelineName": "${CodePipelineName}",
                    "FullRepositoryId": "${FullRepositoryId}",
                    "BranchName": "${BranchName}",
                    "StackName": "${StackName}",
                    "TemplatePath": "${TemplatePath}"
                  }
                OutputFileName: output-pipeline.json
              RunOrder: 1
        - Name: BuildDependencies
          Actions:
            - Name: BuildDeps
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: DepsBuildOutput
              Configuration:
                ProjectName: !Ref CodeBuildDepsProject
              RunOrder: 1
        - Name: DeployDependencies
          Actions:
            - Name: CFDeployDeps
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              InputArtifacts:
                - Name: DepsBuildOutput
                - Name: SourceOutput
              Configuration:
                RoleArn: !GetAtt CloudFormationServiceRole.Arn
                ActionMode: CREATE_UPDATE
                Capabilities: CAPABILITY_IAM,CAPABILITY_AUTO_EXPAND
                StackName: !Sub "cobaemon-portfolio-dependencies-${Env}"
                TemplatePath: "SourceOutput::dependencies.yaml"
                TemplateConfiguration: DepsBuildOutput::deps-parameters.json
                OutputFileName: output-deps.json
              RunOrder: 1
        - Name: Build
          Actions:
            - Name: CodeBuildAction
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              Configuration:
                ProjectName: !Ref CodeBuildProject
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: CloudFormationDeploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              InputArtifacts:
                - Name: BuildOutput
              Configuration:
                RoleArn: !GetAtt CloudFormationServiceRole.Arn
                ActionMode: CREATE_UPDATE
                Capabilities: CAPABILITY_IAM,CAPABILITY_AUTO_EXPAND,CAPABILITY_NAMED_IAM
                StackName: !Ref StackName
                TemplatePath: !Join ["", ["BuildOutput::", !Ref TemplatePath]]
                TemplateConfiguration: BuildOutput::parameters.json
                OutputFileName: output.json
              RunOrder: 1
            - Name: BucketPolicyDeploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              InputArtifacts:
                - Name: BuildOutput
              Configuration:
                RoleArn: !GetAtt CloudFormationServiceRole.Arn
                ActionMode: CREATE_UPDATE
                Capabilities: CAPABILITY_IAM,CAPABILITY_AUTO_EXPAND,CAPABILITY_NAMED_IAM
                StackName: !Sub "cobaemon-serverless-portfolio-bucketpolicy-${Env}"
                TemplatePath: "BuildOutput::bucketpolicy.yaml"
                TemplateConfiguration: BuildOutput::bucketpolicy-parameters.json
                OutputFileName: output-bucketpolicy.json
              RunOrder: 2
      Tags:
        - Key: env
          Value: !Ref Env
        - Key: app
          Value: portfolio
        - Key: service
          Value: codepipeline

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${CodePipelineName}-Build"
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:6.0
        Type: LINUX_CONTAINER
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: ENV
            Value: !Ref Env
          - Name: S3Bucket
            Value: !Ref S3Bucket
      Source:
        Type: CODEPIPELINE
      Artifacts:
        Type: CODEPIPELINE
      LogsConfig:
        CloudWatchLogs:
          GroupName: !Sub "/aws/codebuild/${CodePipelineName}-Build"
          Status: ENABLED
        S3Logs:
          Status: ENABLED
          Location: !Sub "${S3Bucket}/build-logs"
      Tags:
        - Key: env
          Value: !Ref Env
        - Key: app
          Value: portfolio
        - Key: service
          Value: codebuild

  CodeBuildDepsProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${CodePipelineName}-Deps"
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:6.0
        Type: LINUX_CONTAINER
        EnvironmentVariables:
          - Name: ENV
            Value: !Ref Env
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-deps.yml
      Artifacts:
        Type: CODEPIPELINE
      LogsConfig:
        CloudWatchLogs:
          GroupName: !Sub "/aws/codebuild/${CodePipelineName}-Deps"
          Status: ENABLED
        S3Logs:
          Status: ENABLED
          Location: !Sub "${S3Bucket}/build-logs"
      Tags:
        - Key: env
          Value: !Ref Env
        - Key: app
          Value: portfolio
        - Key: service
          Value: codebuild-deps


  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Env}-portfolio-pipeline-role"
      AssumeRolePolicyDocument:
      
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - codepipeline.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      Policies:
        - PolicyName: PassRolePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: 
                  - !GetAtt CloudFormationServiceRole.Arn
                Condition:
                  StringEquals:
                    'iam:PassedToService': cloudformation.amazonaws.com
      Tags:
        - Key: env
          Value: !Ref Env
        - Key: app
          Value: portfolio
        - Key: service
          Value: role

  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Env}-portfolio-build-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildSecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${Env}/portfolio/secret-*"
        - PolicyName: CodeBuildS3StaticFilesAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - "s3:PutObject"
                  - "s3:GetObject"
                  - "s3:ListBucket"
                  - "s3:DeleteObject"
                Resource:
                  - !Sub "arn:aws:s3:::cobaemon-serverless-portfolio-${Env}-static"
                  - !Sub "arn:aws:s3:::cobaemon-serverless-portfolio-${Env}-static/*"
        - PolicyName: CodeBuildSSMParameterAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${Env}/portfolio/parameter/*"
        - PolicyName: CodeBuildS3ArtifactAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !Sub "arn:aws:s3:::${S3Bucket}"
                  - !Sub "arn:aws:s3:::${S3Bucket}/*"
        - PolicyName: CodeBuildRoute53ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - route53:ListHostedZonesByName
                  - route53:ListResourceRecordSets
                Resource: "*"
        - PolicyName: CodeBuildCloudFormationReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStackResource
                Resource:
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${StackName}/*"
        - PolicyName: CodeBuildCloudFrontOACAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudfront:ListOriginAccessControls
                  - cloudfront:CreateOriginAccessControl
                Resource: "*"
        - PolicyName: CodeBuildCloudWatchLogsWriteAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${CodePipelineName}-Build"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${CodePipelineName}-Build:*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${CodePipelineName}-Deps"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${CodePipelineName}-Deps:*"
      Tags:
        - Key: env
          Value: !Ref Env
        - Key: app
          Value: portfolio
        - Key: service
          Value: role

  CloudFormationServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Env}-portfolio-cfn-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudFormationDeploymentAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ManagePortfolioIamRoles
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:UpdateRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:PutRolePolicy
                  - iam:GetRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:UpdateAssumeRolePolicy
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/${Env}-portfolio-*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/*portfolio-${Env}*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/*serverless-portfolio-${Env}*"
              - Sid: PassPortfolioRoles
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/${Env}-portfolio-*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/*portfolio-${Env}*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/*serverless-portfolio-${Env}*"
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - cloudformation.amazonaws.com
                      - codebuild.amazonaws.com
                      - codepipeline.amazonaws.com
                      - lambda.amazonaws.com
              - Sid: ManagePortfolioLambda
                Effect: Allow
                Action:
                  - lambda:AddPermission
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:ListTags
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*portfolio*"
              - Sid: ManagePortfolioApiGateway
                Effect: Allow
                Action:
                  - apigateway:DELETE
                  - apigateway:GET
                  - apigateway:PATCH
                  - apigateway:POST
                  - apigateway:PUT
                Resource:
                  - !Sub "arn:aws:apigateway:${AWS::Region}::*"
              - Sid: ManagePortfolioCertificate
                Effect: Allow
                Action:
                  - acm:AddTagsToCertificate
                  - acm:DeleteCertificate
                  - acm:DescribeCertificate
                  - acm:ListTagsForCertificate
                  - acm:RemoveTagsFromCertificate
                  - acm:RequestCertificate
                Resource: "*"
              - Sid: ReadPortfolioConfigurationValues
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${Env}/portfolio/secret-*"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${Env}/portfolio/parameter/*"
              - Sid: ManagePortfolioRoute53
                Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:GetChange
                  - route53:GetHostedZone
                  - route53:ListHostedZonesByName
                  - route53:ListResourceRecordSets
                Resource: "*"
              - Sid: ManagePortfolioCloudFront
                Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:CreateOriginAccessControl
                  - cloudfront:CreateResponseHeadersPolicy
                  - cloudfront:DeleteDistribution
                  - cloudfront:DeleteOriginAccessControl
                  - cloudfront:DeleteResponseHeadersPolicy
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:GetOriginAccessControl
                  - cloudfront:GetOriginAccessControlConfig
                  - cloudfront:GetResponseHeadersPolicy
                  - cloudfront:GetResponseHeadersPolicyConfig
                  - cloudfront:ListOriginAccessControls
                  - cloudfront:ListResponseHeadersPolicies
                  - cloudfront:ListTagsForResource
                  - cloudfront:TagResource
                  - cloudfront:UntagResource
                  - cloudfront:UpdateDistribution
                  - cloudfront:UpdateOriginAccessControl
                  - cloudfront:UpdateResponseHeadersPolicy
                Resource: "*"
              - Sid: ManagePortfolioS3
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketCors
                  - s3:GetBucketPolicy
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketTagging
                  - s3:GetBucketLocation
                  - s3:ListBucket
                  - s3:PutBucketCors
                  - s3:PutBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketTagging
                Resource:
                  - !Sub "arn:aws:s3:::cobaemon-serverless-portfolio-${Env}-static"
                  - !Sub "arn:aws:s3:::cobaemon-serverless-portfolio-${Env}-static/*"
              - Sid: ManagePortfolioPipeline
                Effect: Allow
                Action:
                  - codepipeline:CreatePipeline
                  - codepipeline:DeletePipeline
                  - codepipeline:GetPipeline
                  - codepipeline:GetPipelineState
                  - codepipeline:TagResource
                  - codepipeline:UntagResource
                  - codepipeline:UpdatePipeline
                Resource:
                  - !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${CodePipelineName}"
              - Sid: ManagePortfolioCodeBuild
                Effect: Allow
                Action:
                  - codebuild:BatchGetProjects
                  - codebuild:CreateProject
                  - codebuild:DeleteProject
                  - codebuild:TagResource
                  - codebuild:UntagResource
                  - codebuild:UpdateProject
                Resource:
                  - !Sub "arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/${CodePipelineName}-Build"
                  - !Sub "arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/${CodePipelineName}-Deps"
              - Sid: ManagePortfolioLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${CodePipelineName}-Build"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${CodePipelineName}-Build:*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${CodePipelineName}-Deps"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${CodePipelineName}-Deps:*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*portfolio*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*portfolio*:*"
              - Sid: ReadPortfolioCloudFormation
                Effect: Allow
                Action:
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStacks
                  - cloudformation:GetTemplate
                  - cloudformation:ListStackResources
                Resource: "*"
              - Sid: UseServerlessTransform
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                Resource:
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:aws:transform/Serverless-2016-10-31"
      Tags:
        - Key: env
          Value: !Ref Env
        - Key: app
          Value: portfolio
        - Key: service
          Value: cloudformation-role
