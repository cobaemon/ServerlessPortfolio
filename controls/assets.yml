{
  "version": 1,
  "format": "json-compatible-yaml",
  "prohibited_assets": [
    ".git/**",
    ".codex/audit/**",
    ".codex/state/**",
    ".codex/logs/**",
    ".env",
    ".env.*",
    "*.pem",
    "*.key",
    "id_rsa",
    "id_ed25519",
    ".aws/**",
    "**/credentials",
    "**/secrets/**",
    "**/*secret*",
    "**/*token*",
    "external absolute paths",
    "parent traversal paths",
    "shell-expanded unknown paths",
    "ignored file enumeration",
    "hidden/ignored whole-tree enumeration",
    "pathless recursive listing"
