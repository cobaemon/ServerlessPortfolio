{
  "version": 1,
  "format": "json-compatible-yaml",
  "fixed_procedures": [
    {
      "id": "PROC-CODEX-HOOK",
      "title": "CodexHook policy adapter",
      "required_entrypoint": ".codex/hooks/codex_hook_adapter.py",
      "policy_engine": "scripts.control.policy_engine"
    },
    {
      "id": "PROC-SHELL-WRAPPER",
      "title": "PATH shell wrapper",
      "required_entrypoint": ".codex/bin/guarded_command.py",
      "policy_engine": "scripts.control.policy_engine",
      "activation": "prepend .codex/bin to PATH for AI execution environments"
    },
    {
      "id": "PROC-GIT-HOOK",
      "title": "GitHook policy gate",
      "hooks": [".githooks/pre-commit", ".githooks/commit-msg", ".githooks/pre-push"],
      "policy_engine": "scripts.control.policy_engine"
    },
    {
      "id": "PROC-CI-GATE",
      "title": "CI policy validation",
      "commands": [
        "python -B -m scripts.control.cli --validate-policy",
        "python -B -m scripts.control.cli --validate-hooks",
        "python -B -m scripts.control.cli --validate-githooks",
        "python -B -m scripts.control.cli --self-test"
      ]
    }
  ]
}
