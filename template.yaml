AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CodePipeline for Serverless Portfolio using SAM

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Architectures:
      - x86_64

Parameters:
  Env:
    Type: String
    Description: "Deployment environment (staging or prod)"
    Default: prod
    AllowedValues:
      - staging
      - prod
  AllowedOrigin:
    Type: AWS::SSM::Parameter::Value<String>
    Description: "The allowed origin for CORS and CSRF protection (e.g. https://example.com)"
    Default: /prod/portfolio/parameter/csrf_trusted_origins
  AllowedHosts:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /prod/portfolio/parameter/allowed_hosts
  HostedZoneId:
    Type: String
    Description: "Route53 Hosted Zone ID for custom domain"
  DomainName:
    Type: String
    Default: serverless.portfolio.cobaemon.com
  ExistingARecord:
    Type: String
    Description: "Whether an existing A record exists (true/false)"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

Conditions:
  IsProd: !Equals [ !Ref Env, prod ]
  CreateARecord: !Equals [ !Ref ExistingARecord, "false" ]

Mappings:
  EnvMapping:
    staging:
      SettingsModule: "config.settings.staging"
    prod:
      SettingsModule: "config.settings.prod"

Resources:
  DjangoFunction:
    Type: AWS::Serverless::Function
    Properties:
      # FunctionName: CobaemonServerlessPortfolioFunction
      Handler: asgi_lambda.handler
      Runtime: python3.12
      CodeUri: ./
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          DJANGO_SETTINGS_MODULE: !FindInMap [EnvMapping, !Ref Env, SettingsModule]
          DJANGO_SECRET_KEY: !Sub "{{resolve:secretsmanager:${Env}/portfolio/secret:SecretString:DJANGO_SECRET_KEY}}"
          EMAIL_HOST_USER: !Sub "{{resolve:secretsmanager:${Env}/portfolio/secret:SecretString:EMAIL_HOST_USER}}"
          EMAIL_HOST_PASSWORD: !Sub "{{resolve:secretsmanager:${Env}/portfolio/secret:SecretString:EMAIL_HOST_PASSWORD}}"
          GOOGLE_CLIENT_ID: !Sub "{{resolve:secretsmanager:${Env}/portfolio/secret:SecretString:GOOGLE_CLIENT_ID}}"
          GOOGLE_CLIENT_SECRET: !Sub "{{resolve:secretsmanager:${Env}/portfolio/secret:SecretString:GOOGLE_CLIENT_SECRET}}"
          GITHUB_CLIENT_ID: !Sub "{{resolve:secretsmanager:${Env}/portfolio/secret:SecretString:GITHUB_CLIENT_ID}}"
          GITHUB_CLIENT_SECRET: !Sub "{{resolve:secretsmanager:${Env}/portfolio/secret:SecretString:GITHUB_CLIENT_SECRET}}"
          ALLOWED_HOSTS: !Ref AllowedHosts
          CSRF_TRUSTED_ORIGINS: !Ref AllowedOrigin
          DEFAULT_FROM_EMAIL: !Sub "{{resolve:ssm:/${Env}/portfolio/parameter/default_from_email}}"
          DEFAULT_TO_EMAIL: !Sub "{{resolve:ssm:/${Env}/portfolio/parameter/default_to_mail}}"
          EMAIL_HOST: !Sub "{{resolve:ssm:/${Env}/portfolio/parameter/email_host}}"
          EMAIL_PORT: !Sub "{{resolve:ssm:/${Env}/portfolio/parameter/email_port}}"
          EMAIL_USE_TLS: !Sub "{{resolve:ssm:/${Env}/portfolio/parameter/email_use_tls}}"
          EMAIL_USE_SSL: !Sub "{{resolve:ssm:/${Env}/portfolio/parameter/email_use_ssl}}"
          STATIC_URL: !Sub "https://${CloudFrontDistribution.DomainName}/"
          CLOUDFRONT_DOMAIN_NAME: !GetAtt CloudFrontDistribution.DomainName
          LOG_LEVEL: !Sub "{{resolve:ssm:/${Env}/portfolio/parameter/log_level}}"
          ENV: !Ref Env
      Events:
        PostEndpoint:
          Type: Api
          Properties:
            RestApiId: !Ref DjangoApi
            Path: /
            Method: POST
        ProxyGet:
          Type: Api
          Properties:
            RestApiId: !Ref DjangoApi
            Path: /{proxy+}
            Method: GET
        ProxyPost:
          Type: Api
          Properties:
            RestApiId: !Ref DjangoApi
            Path: /{proxy+}
            Method: POST
        ProxyOptions:
          Type: Api
          Properties:
            RestApiId: !Ref DjangoApi
            Path: /{proxy+}
            Method: OPTIONS
    Policies:
      - AWSLambdaBasicExecutionRole
      - Statement:
        Effect: Allow
        Action:
          - s3:GetObject
          - s3:ListBucket
        Resource:
          - !Sub "arn:aws:s3:::cobaemon-serverless-portfolio-${Env}-static"
          - !Sub "arn:aws:s3:::cobaemon-serverless-portfolio-${Env}-static/*"
    Tags:
      - Key: env
        Value: !Ref Env
      - Key: app
        Value: portfolio
      - Key: service
        Value: lambda
  
  DjangoApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Env
      Name: CobaemonServerlessPortfolioApi
      MergeDefinitions: true
      DefinitionBody:
        swagger: "2.0"
        info:
          title: CobaemonServerlessPortfolioApi
          version: "1.0"
        paths:
          /:
            get:
              responses:
                "301":
                  description: Redirect to the portfolio top page without invoking Lambda.
                  headers:
                    Location:
                      type: string
                    Cache-Control:
                      type: string
              x-amazon-apigateway-integration:
                type: mock
                passthroughBehavior: when_no_match
                requestTemplates:
                  application/json: '{"statusCode": 301}'
                responses:
                  default:
                    statusCode: "301"
                    responseParameters:
                      method.response.header.Location: "'/portfolio/top/'"
                      method.response.header.Cache-Control: "'no-cache'"
                    responseTemplates:
                      application/json: ""
      Cors:
        AllowOrigin: !Sub "'${AllowedOrigin}'"
        AllowMethods: "'GET,POST,OPTIONS'"

  ServerlessCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  ApiGatewayCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref DomainName
      RegionalCertificateArn: !Ref ServerlessCertificate
      EndpointConfiguration:
        Types:
          - REGIONAL

  ApiGatewayBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn:
    - DjangoApiStage
    Properties:
      DomainName: !Ref ApiGatewayCustomDomain
      RestApiId: !Ref DjangoApi
      Stage: !Ref Env
      BasePath: ""

  ApiGatewayRecordSet:
    Type: AWS::Route53::RecordSet
    Condition: CreateARecord
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "${DomainName}."
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiGatewayCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiGatewayCustomDomain.RegionalHostedZoneId

